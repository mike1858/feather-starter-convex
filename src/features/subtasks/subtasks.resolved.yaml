timestamps: false
behaviors:
  softDelete: false
  auditTrail: false
  immutable: false
  assignable: false
  orderable: true
access:
  scope: owner
  permissions:
    create: authenticated
    read: authenticated
    update: owner
    delete: owner
  sharing: false
views:
  default:
    defaultView: list
    enabledViews:
      - list
  table:
    design: minimal
    pageSize: 20
  card:
    size: default
    orientation: grid
    imageStyle: none
  list:
    density: comfortable
  detail:
    display: page
  pagination:
    table:
      mode: offset
      pageSize: 20
    list:
      mode: infinite
    card:
      mode: infinite
    cover:
      mode: infinite
operations:
  create: true
  read: true
  update: true
  delete: true
search: false
searchFields:
  - title
  - description
i18n:
  languages:
    - en
    - es
name: subtasks
label: Subtask
labelPlural: Subtasks
fields:
  title:
    type: string
    required: true
    max: 200
    showOn: all
    hideOn: &a1 []
    filterable: false
    sortable: true
  status:
    type: enum
    required: false
    max: 200
    showOn: all
    hideOn: *a1
    filterable: false
    sortable: true
    values:
      - todo
      - done
      - promoted
    default: todo
    colors:
      todo: 0
      done: 1
      promoted: 2
relationships:
  task:
    type: belongs_to
    target: tasks
    required: true
    column: taskId
indexes:
  - name: by_task
    fields:
      - taskId
  - name: by_userId
    fields:
      - userId
  - name: by_status
    fields:
      - status
  - name: by_taskId
    fields:
      - taskId
