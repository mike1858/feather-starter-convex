name: subtasks
label: Subtask
labelPlural: Subtasks

fields:
  title:
    type: string
    required: true
    max: 200
  status:
    type: enum
    values: [todo, done, promoted]
    default: todo

timestamps: false

behaviors:
  assignable: false
  orderable: true
  softDelete: false

access:
  scope: owner
  permissions:
    create: authenticated
    read: authenticated
    update: owner
    delete: owner

views:
  default:
    defaultView: list
    enabledViews: [list]

relationships:
  task:
    type: belongs_to
    target: tasks
    required: true
    column: taskId

indexes:
  - name: by_task
    fields: [taskId]
