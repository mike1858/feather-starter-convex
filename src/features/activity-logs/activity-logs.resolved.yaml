timestamps: false
behaviors:
  softDelete: false
  auditTrail: false
  immutable: true
  assignable: false
  orderable: false
access:
  scope: authenticated
  permissions:
    create: authenticated
    read: authenticated
    update: false
    delete: false
  sharing: false
views:
  default:
    defaultView: list
    enabledViews:
      - list
  table:
    design: minimal
    pageSize: 20
  card:
    size: default
    orientation: grid
    imageStyle: none
  list:
    density: comfortable
  detail:
    display: page
  pagination:
    table:
      mode: offset
      pageSize: 20
    list:
      mode: infinite
    card:
      mode: infinite
    cover:
      mode: infinite
operations:
  create: true
  read: true
  update: false
  delete: false
search: false
searchFields:
  - title
  - description
i18n:
  languages:
    - en
    - es
name: activity-logs
label: Activity Log
labelPlural: Activity Logs
fields:
  entityType:
    type: enum
    required: true
    max: 200
    showOn: all
    hideOn: &a1 []
    filterable: false
    sortable: true
    values:
      - task
      - project
      - subtask
    colors:
      task: 0
      project: 1
      subtask: 2
  action:
    type: enum
    required: true
    max: 200
    showOn: all
    hideOn: *a1
    filterable: false
    sortable: true
    values:
      - created
      - status_changed
      - assigned
      - unassigned
      - edited
      - deleted
      - completed
      - promoted
    colors:
      created: 0
      status_changed: 1
      assigned: 2
      unassigned: 3
      edited: 4
      deleted: 5
      completed: 6
      promoted: 7
  metadata:
    type: text
    required: false
    max: 5000
    showOn: all
    hideOn: *a1
    filterable: false
    sortable: false
indexes:
  - name: by_entityType_entityId
    fields:
      - entityType
      - entityId
  - name: by_userId
    fields:
      - userId
  - name: by_entityType
    fields:
      - entityType
  - name: by_action
    fields:
      - action
