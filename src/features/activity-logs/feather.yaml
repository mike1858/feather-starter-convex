name: activityLogs
label: Activity Log
labelPlural: Activity Logs

fields:
  entityType:
    type: enum
    values: [task, project, subtask]
    required: true
  entityId:
    type: string
    required: true
  action:
    type: enum
    values: [created, status_changed, assigned, unassigned, edited, deleted, completed, promoted]
    required: true
  actor:
    type: string
    required: true
  metadata:
    type: text
    required: false
    max: 5000

timestamps: false

behaviors:
  assignable: false
  orderable: false
  softDelete: false
  immutable: true

access:
  scope: custom
  permissions:
    create: custom
    read: authenticated
    update: custom
    delete: custom

operations:
  create: false
  read: true
  update: false
  delete: false

views:
  defaultView: list
  enabledViews: [list]

indexes:
  - name: by_entity
    fields: [entityType, entityId]
  - name: by_actor
    fields: [actor]
