name: activityLogs
label: Activity Log
labelPlural: Activity Logs

kind: system  # Generator produces schema + read-only timeline view, skips CRUD forms/mutations

fields:
  entityType:
    type: enum
    values: [task, project, subtask]
    required: true
  entityId:
    type: string
    required: true
    # Polymorphic reference — points to tasks, projects, or subtasks table
  action:
    type: enum
    values: [created, status_changed, assigned, unassigned, edited, deleted, completed, promoted]
    required: true
  metadata:
    type: text
    required: false
    max: 5000

timestamps: false

identity:
  type: auto-increment

behaviors:
  assignable: false
  orderable: false
  softDelete: false
  immutable: true

access:
  scope: custom
  permissions:
    create: custom  # System-only writes
    read: authenticated
    update: custom
    delete: custom

operations:
  create: false
  read: true
  update: false
  delete: false

views:
  defaultView: list
  enabledViews: [list]

relationships:
  actor:
    type: belongs_to
    target: users
    column: actor
    required: true

detailView:  # TODO: generator pending
  layout: timeline
  groupBy: date

indexes:
  - name: by_entity
    fields: [entityType, entityId]
  - name: by_actor
    fields: [actor]
