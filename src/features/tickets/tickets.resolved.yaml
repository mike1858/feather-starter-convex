timestamps: false
behaviors:
  softDelete: false
  auditTrail: false
  immutable: false
  assignable: true
  orderable: true
access:
  scope: owner
  permissions:
    create: authenticated
    read: owner
    update: owner
    delete: owner
  sharing: false
views:
  default:
    defaultView: list
    enabledViews:
      - list
  table:
    design: minimal
    pageSize: 20
  card:
    size: default
    orientation: grid
    imageStyle: none
  list:
    density: comfortable
  detail:
    display: page
  pagination:
    table:
      mode: offset
      pageSize: 20
    list:
      mode: infinite
    card:
      mode: infinite
    cover:
      mode: infinite
operations:
  create: true
  read: true
  update: true
  delete: true
search: false
searchFields:
  - title
  - description
i18n:
  languages:
    - en
    - es
name: tickets
label: Ticket
labelPlural: Tickets
fields:
  title:
    type: string
    required: true
    max: 200
    showOn: all
    hideOn: &a1 []
    filterable: false
    sortable: true
  description:
    type: text
    required: false
    max: 5000
    showOn: all
    hideOn: *a1
    filterable: false
    sortable: false
  status:
    type: enum
    required: false
    max: 200
    showOn: all
    hideOn: *a1
    filterable: true
    sortable: true
    values:
      - open
      - in_progress
      - resolved
      - closed
    default: open
    colors:
      open: 0
      in_progress: 1
      resolved: 2
      closed: 3
  priority:
    type: enum
    required: false
    max: 200
    showOn: all
    hideOn: *a1
    filterable: true
    sortable: true
    values:
      - low
      - medium
      - high
      - critical
    default: medium
    colors:
      low: 0
      medium: 1
      high: 2
      critical: 3
indexes:
  - name: by_userId
    fields:
      - userId
  - name: by_status
    fields:
      - status
  - name: by_priority
    fields:
      - priority
