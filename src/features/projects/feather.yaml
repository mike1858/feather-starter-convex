name: projects
label: Project
labelPlural: Projects

kind: standard

fields:
  name:
    type: string
    required: true
    max: 100
  description:
    type: text
    max: 5000
    # TODO: not yet in convex/schema.ts — add when generator catches up
  status:
    type: enum
    values: [active, on_hold, completed, archived]
    default: active
    filterable: true
    transitions:  # TODO: generator pending
      active: [on_hold, completed, archived]
      on_hold: [active, archived]
      completed: [archived]
      # archived is terminal — no transitions out

timestamps: false

identity:
  type: auto-increment

behaviors:
  assignable: false
  orderable: false
  softDelete: false
  auditTrail: true
  immutable: false

access:
  scope: owner
  permissions:
    create: authenticated
    read: owner
    update: owner
    delete: owner

views:
  defaultView: list
  enabledViews: [list, card]
  filteredViews:
    - name: by-status
      label: By Status
      filter: { status: $param }
      navEntry: false

operations:
  create: true
  read: true
  update: true
  delete: true

relationships:
  tasks:
    type: has_many
    target: tasks
    foreignKey: projectId
    cascade: true

detailView:  # TODO: generator pending
  layout: panels
  relatedRecords:
    - source: tasks
      display: table
      inline: true
      filters: [status, priority, assignee]

derivedData:  # TODO: generator pending
  taskCount:
    type: count
    source: tasks

hooks:  # TODO: generator pending
  onStatusChange: custom/projects/hooks/onStatusChange
  beforeDelete: custom/projects/hooks/beforeDelete

indexes:
  - name: by_status
    fields: [status]
  - name: by_creator
    fields: [creatorId]
