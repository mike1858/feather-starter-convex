field_defaults:
  type: string
  required: false
  max: 200
  showOn: all
  hideOn: []
  filterable: false
  sortable: true

field_type_defaults:
  text:
    max: 5000
    sortable: false
  boolean:
    default: false
  number:
    default: 0

timestamps: both

behaviors:
  softDelete: false
  auditTrail: false
  immutable: false
  assignable: false
  orderable: false

access:
  scope: owner
  permissions:
    create: authenticated
    read: owner
    update: owner
    delete: owner
  sharing: false

views:
  default:
    defaultView: list
    enabledViews:
      - list
      - card
      - table
  table:
    design: minimal
    pageSize: 20
  card:
    size: default
    orientation: grid
    imageStyle: none
  list:
    density: comfortable
  detail:
    display: page
  pagination:
    table:
      mode: offset
      pageSize: 20
    list:
      mode: infinite
    card:
      mode: infinite
    cover:
      mode: infinite

operations:
  create: true
  read: true
  update: true
  delete: true

search: false
searchFields:
  - title
  - description

i18n:
  languages:
    - en
    - es
